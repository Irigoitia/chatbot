version: "3.1"

intents:
  - saludo
  - despedida
  - afirmar
  - denegar
  - animo_excelente
  - animo_triste
  - reto_bot
  - consultar_dolar

entities:
  - tipo_dolar

slots:
  tipo_dolar:
    type: text
    mappings:
      - type: from_entity
        entity: tipo_dolar

actions:
  - action_consultar_dolar
  
responses:
  utter_saludo:
  - text: "¡Hola! ¿Cómo estás?"

  utter_animar:
  - text: "Aquí tienes algo para animarte:"
    image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_ayudo:
  - text: "¿Te sirvió de ayuda?"

  utter_feliz:
  - text: "¡Genial, continúa así!"

  utter_despedida:
  - text: "Adiós"

  utter_soy_bot:
  - text: "Soy un bot, programado con Rasa."

session_config:
  session_expiration_time: 1
  carry_over_slots_to_new_session: true